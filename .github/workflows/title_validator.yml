# ============================================================================
# Workflow: Title Validation & Recommendation Engine
# Purpose : Scans Excel titles against MDL, AsianWiki, and IMDb
# ============================================================================

name: Validate Drama Titles

on:
  workflow_dispatch:
    inputs:
      sheets:
        description: 'Sheets to scan (separated by semicolon)'
        required: true
        default: 'Sheet1'
        # default: 'Sheet1;Sheet2'

jobs:
  validate-titles:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    
    # REQUIRED for the relay-race to commit the state JSON file
    permissions:
      contents: write
      actions: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas bs4 cloudscraper duckduckgo-search gspread gspread-dataframe

      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json

      - name: 5. Run Title Validator Script
        env:
          CHECK_TITLES_EXCEL_ID: ${{ secrets.CHECK_TITLES_EXCEL_ID }}
          SHEETS: ${{ github.event.inputs.sheets }}
          MAX_FETCHES: "50" # Forces script to pause, preventing timeouts & rate-limits
        run: |
          python title_validator.py

      - name: 6. Cleanup Secret Files
        if: always()
        run: |
          rm -f EXCEL_FILE_ID.txt GDRIVE_SERVICE_ACCOUNT.json

      - name: 7. Commit, Push, and Trigger Next Batch
        id: relay_race
        if: success() || failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTINUE_RUN=false
          # FIXED: Added the space after 'if ['
          if [ -f "RESUME_FLAG.txt" ]; then
            CONTINUE_RUN=true
            rm RESUME_FLAG.txt
          fi
          
          # Output this variable to Step 8 to prevent early emails
          echo "continue_batch=$CONTINUE_RUN" >> "$GITHUB_OUTPUT"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A --force
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Automated title validation batch: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
          
          if [ "$CONTINUE_RUN" = true ]; then
            echo "Batch paused. Triggering the next batch immediately..."
            # Trigger itself automatically with the same user inputs!
            gh workflow run "Validate Drama Titles" -f sheets="${{ github.event.inputs.sheets }}"
          fi

      - name: 8. Send Final Email Notification
        # ONLY send the email if the relay race is COMPLETELY finished, OR if the script crashed.
        if: always() && steps.relay_race.outputs.continue_batch != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: >
            ${{ job.status == 'success' && '✅ Drama Title Validation Completed' || '❌ Title Validation FAILED' }}
          body: file://email_body.txt
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}