# ============================================================================
# Workflow: Title Validation & Recommendation Engine (Strict Matching)
# ============================================================================

name: Validate Drama Titles

on:
  workflow_dispatch:
    inputs:
      sheets:
        description: 'Sheets to scan (separated by semicolon)'
        required: true
        default: 'Feb 7 2023 Onwards'
        # default: 'Feb 7 2023 Onwards;Before Feb 7 2023 (Korean);Before Feb 7 2023 ( Korean Dub);Before Feb 7 2023;Mini Drama'
      max_fetches:
        description: 'Max New Rows to Fetch Per Run'
        required: false
        default: '50'
      force_check:
        description: 'Force re-check all rows? (true/false)'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 12 * * 0" # Runs automatically once a week on Sundays

# PREVENT CONFLICTS: Only one run sequence can execute at a time
concurrency:
  group: title-validator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-titles:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ddgs pandas bs4 cloudscraper gspread gspread-dataframe google-api-python-client google-auth-httplib2 google-auth-oauthlib openpyxl

      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json

      - name: 5. Run Title Validator Script
        id: run_script
        env:
          CHECK_TITLES_EXCEL_ID: ${{ secrets.CHECK_TITLES_EXCEL_ID }}
          SHEETS: ${{ github.event.inputs.sheets || 'Feb 7 2023 Onwards' }}
          MAX_FETCHES: ${{ github.event.inputs.max_fetches || '50' }}
          FORCE_CHECK: ${{ github.event.inputs.force_check || 'false' }}
        run: |
          python title_validator.py 2>&1 | tee output.log
          exit_code=${PIPESTATUS[0]}
          
          if[ -f "RESUME_FLAG.txt" ]; then
            echo "CONTINUE_BATCH=true" >> "$GITHUB_OUTPUT"
          else
            echo "CONTINUE_BATCH=false" >> "$GITHUB_OUTPUT"
          fi
          exit $exit_code

      - name: 6. Cleanup Secret Files
        if: always()
        run: |
          rm -f EXCEL_FILE_ID.txt GDRIVE_SERVICE_ACCOUNT.json

      - name: 7. Commit & Push Changes
        if: success() || failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f RESUME_FLAG.txt
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Automated title validation batch: $(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')"
            git push
          fi

      - name: 8. Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: title-validator-results
          path: |
            output.log
            reports/

      - name: 9. Prepare Report for Email
        if: always()
        id: get_report
        run: |
          REPORT_PATH=$(ls -t reports/*_REPORT.txt 2>/dev/null | head -n1 || echo "")
          echo "REPORT_PATH=$REPORT_PATH" >> $GITHUB_ENV
          
          if [ -f "EMAIL_SUBJECT.txt" ]; then
            SUBJECT=$(cat EMAIL_SUBJECT.txt)
            echo "EMAIL_SUBJECT=$SUBJECT" >> $GITHUB_ENV
          else
            echo "EMAIL_SUBJECT=Drama Title Validation [${{ job.status }}]" >> $GITHUB_ENV
          fi

      - name: 10. Trigger Next Batch
        if: success() && steps.run_script.outputs.CONTINUE_BATCH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Batch paused. Triggering the next batch immediately..."
          gh workflow run "Validate Drama Titles" --ref ${{ github.ref_name }} -f sheets="${{ github.event.inputs.sheets || 'Feb 7 2023 Onwards' }}" -f max_fetches="${{ github.event.inputs.max_fetches || '50' }}" -f force_check="${{ github.event.inputs.force_check || 'false' }}"

      - name: 11. Send Final Email Notification
        if: always() && (steps.run_script.outputs.CONTINUE_BATCH == 'false' || job.status != 'success')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          body: file://${{ env.REPORT_PATH }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}