# ============================================================================
# Workflow: Excel → JSON Update (Relay-Race Edition)
# Version : 9.1 (Reporting Master Edition - Full Engine Restoration)
# ============================================================================

name: Excel → JSON Update

on:
  workflow_dispatch:
    inputs:
      max_fetches:
        description: "Max Rows per Batch"
        required: false
        default: "50"
      is_continuation:
        description: "Internal Flag - Do not change"
        required: false
        default: "false"
  schedule:
    - cron: "30 18 * * 6"

concurrency:
  group: movie-db-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    env:
      SHEETS: "Sheet1;Sheet2;Manual Updates"
      DEBUG_FETCH: "true"

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install Dependencies
        run: |
          echo "::group::📦 Dependencies"
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 cloudscraper duckduckgo_search google-api-python-client google-auth-httplib2 google-auth-oauthlib Pillow openpyxl
          echo "::endgroup::"

      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          echo "::group::🔑 Credentials"
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json
          echo "::endgroup::"

      - name: 5. Run Python Engine
        id: run_script
        env:
          MAX_FETCHES: ${{ github.event.inputs.max_fetches || '50' }}
          IS_CONTINUATION: ${{ github.event.inputs.is_continuation || 'false' }}
        run: |
          echo "::group::🚀 Processing Data"
          python create_update_backup_delete.py 2>&1 | tee output.log
          exit_code=${PIPESTATUS[0]}
          
          if [ -f "RESUME_FLAG.txt" ]; then
            echo "CONTINUE_BATCH=true" >> "$GITHUB_OUTPUT"
          else
            echo "CONTINUE_BATCH=false" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"
          exit $exit_code

      - name: 6. Commit & Push Changes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::💾 Saving Changes"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          rm -f RESUME_FLAG.txt
          
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated Batch Update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
          echo "::endgroup::"

      - name: 7. Prepare Report for Email & Summary
        if: always()
        id: get_report
        run: |
          # Matches files ending in _REPORT.txt
          REPORT_PATH=$(ls -t reports/*_REPORT.txt 2>/dev/null | head -n1 || echo "")
          echo "REPORT_PATH=$REPORT_PATH" >> $GITHUB_ENV
          
          if [ -f "EMAIL_SUBJECT.txt" ]; then
            SUBJECT=$(cat EMAIL_SUBJECT.txt)
            echo "EMAIL_SUBJECT=$SUBJECT" >> $GITHUB_ENV
          else
            echo "EMAIL_SUBJECT=Movie DB Update Finished" >> $GITHUB_ENV
          fi
          
          if [ -f "$REPORT_PATH" ]; then
            echo "### 📊 Workflow Execution Summary" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_PATH" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 8. Trigger Next Batch (Relay Race)
        if: success() && steps.run_script.outputs.CONTINUE_BATCH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::notice::Limit hit. Restarting for next batch..."
          gh workflow run "Excel → JSON Update" --ref ${{ github.ref_name }} \
            -f max_fetches=${{ github.event.inputs.max_fetches || '50' }} \
            -f is_continuation=true

      - name: 9. Send Email Notification
        if: always() && (steps.run_script.outputs.CONTINUE_BATCH == 'false' || job.status != 'success')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          body: file://${{ env.REPORT_PATH }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}