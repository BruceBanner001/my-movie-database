# ============================================================================
# Workflow: Excel → JSON Update
# Version : 7.0 (Start Time Fix + Manual/Automatic Email + Runtime)
# ============================================================================

name: Excel → JSON Update

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 6"

jobs:
  update-json:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:

      - name: 1. Checkout repository
        uses: actions/checkout@v4


      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json


      - name: 5. Run Excel → JSON Script
        id: run_updater
        env:
          SHEETS: "Sheet1;Sheet2;Manual Updates"
          GITHUB_PAGES_URL: "https://brucebanner001.github.io/my-movie-database"
          DEBUG_FETCH: "true"
          MAX_FETCHES: "50"
        run: |

          # Capture start time
          START_TIME_FORMATTED=$(TZ='Asia/Kolkata' date +"%d %B %Y %I:%M %p (IST)")
          START_TIME_SECONDS=$(date +%s)

          echo "start_time=$START_TIME_FORMATTED" >> "$GITHUB_OUTPUT"

          python create_update_backup_delete.py 2>&1 | tee output.log
          script_exit_code=${PIPESTATUS[0]}

          # Capture runtime
          END_TIME_SECONDS=$(date +%s)
          RUNTIME=$((END_TIME_SECONDS-START_TIME_SECONDS))

          echo "runtime_seconds=$RUNTIME" >> "$GITHUB_OUTPUT"

          output=$(cat output.log)

          EOF_DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)

          echo "output_log<<$EOF_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "$EOF_DELIMITER" >> "$GITHUB_OUTPUT"

          report_path=$(echo "$output" | grep -oP 'Report written -> \K.*')
          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"

          if [ -f "RESUME_FLAG.txt" ]; then
            echo "IS_FINAL_BATCH=false" >> "$GITHUB_OUTPUT"
          else
            echo "IS_FINAL_BATCH=true" >> "$GITHUB_OUTPUT"
          fi

          exit $script_exit_code


      - name: 6. Cleanup Secret Files
        if: always()
        run: |
          rm -f EXCEL_FILE_ID.txt GDRIVE_SERVICE_ACCOUNT.json


      - name: 7. Commit & Push Changes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          CONTINUE_RUN=false

          if [ -f "RESUME_FLAG.txt" ]; then
            CONTINUE_RUN=true
            rm RESUME_FLAG.txt
          fi

          rm -f output.log

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated data update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

          if [ "$CONTINUE_RUN" = true ]; then
            echo "Triggering next batch..."
            gh workflow run "Excel → JSON Update" --ref ${{ github.ref_name }}
          fi


      - name: 8. Compose Email Report
        id: compose_email
        if: always()
        env:
          WORKFLOW_STATUS: ${{ job.status }}
          SCRIPT_OUTPUT: ${{ steps.run_updater.outputs.output_log }}
          REPORT_PATH: ${{ steps.run_updater.outputs.report_path }}
        run: |

          email_body_file=$(mktemp)
          echo "body_file=$email_body_file" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER_TYPE="Manual"
          else
            TRIGGER_TYPE="Automatic"
          fi

          START_TIME="${{ steps.run_updater.outputs.start_time }}"
          END_TIME=$(TZ='Asia/Kolkata' date +"%d %B %Y %I:%M %p (IST)")
          RUNTIME=${{ steps.run_updater.outputs.runtime_seconds }}

          if [[ -n "$REPORT_PATH" && -f "$REPORT_PATH" ]]; then
            report_file="$REPORT_PATH"
          else
            report_file=$(find reports -type f -name "*_REPORT.txt" | sort -r | head -n1 || true)
          fi

          {
            echo "✅ Workflow Batch completed successfully"
            echo "🏁 Final Batch Completed"
            echo "══════════════════════════════════════════════════════"
            echo "📊 My Movie Database – Excel to JSON Workflow Report"
            echo "══════════════════════════════════════════════════════"
            echo ""
            echo "🚀 Workflow Type : $TRIGGER_TYPE"
            echo "⏰ Start Time    : $START_TIME"
            echo "⏰ End Time      : $END_TIME"
            echo "⏱️ Runtime       : ${RUNTIME} seconds"
            echo ""

            if [[ "${WORKFLOW_STATUS}" == "success" ]]; then

              if [[ -f "$report_file" ]]; then
                cat "$report_file"
              else
                echo "⚠️ Report file not found."
              fi

            else

              echo "❌ Workflow FAILED"
              echo ""
              echo "$SCRIPT_OUTPUT"

            fi

          } > "$email_body_file"


      - name: 9. Prepare Email Subject
        id: email_subject
        if: always()
        run: |

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER_TYPE="Manual"
          else
            TRIGGER_TYPE="Automatic"
          fi

          RUN_DATE=$(TZ='Asia/Kolkata' date +"%d %B %Y %H:%M IST")

          SUBJECT="[$TRIGGER_TYPE] Workflow $RUN_DATE Report"

          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"


      - name: 10. Send Email Notification
        if: always() && (steps.run_updater.outputs.IS_FINAL_BATCH == 'true' || job.status != 'success')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.email_subject.outputs.subject }}
          body: file://${{ steps.compose_email.outputs.body_file }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}