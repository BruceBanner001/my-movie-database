# ============================================================================
# Workflow: Excel → JSON Update
# Version : 8.5 (Relay-Race + Professional IST Reporting)
# ============================================================================

name: Excel → JSON Update

on:
  workflow_dispatch:
    inputs:
      max_fetches:
        description: "Maximum Items to Fetch Per Batch"
        required: false
        default: "50"
  schedule:
    - cron: "30 18 * * 6"

# PREVENT CONFLICTS: Only one batch sequence can run at a time
concurrency:
  group: movie-db-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-json:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    env:
      SHEETS: "Sheet1;Sheet2;Manual Updates"
      GITHUB_PAGES_URL: "https://brucebanner001.github.io/my-movie-database"
      DEBUG_FETCH: "true"

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install Dependencies
        run: |
          echo "::group::📦 Installing Dependencies"
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "::notice::requirements.txt not found"
          fi
          echo "::endgroup::"

      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          echo "::group::🔑 Configuring Credentials"
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json
          echo "::endgroup::"

      - name: 5. Run Excel → JSON Engine
        id: run_updater
        env:
          MAX_FETCHES: ${{ github.event.inputs.max_fetches || '50' }}
        run: |
          echo "::group::🚀 Executing Python Engine"
          python create_update_backup_delete.py 2>&1 | tee output.log
          script_exit_code=${PIPESTATUS[0]}
          
          if [ -f "RESUME_FLAG.txt" ]; then
            echo "IS_FINAL_BATCH=false" >> "$GITHUB_OUTPUT"
          else
            echo "IS_FINAL_BATCH=true" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"
          exit $script_exit_code

      - name: 6. Cleanup Secret Files
        if: always()
        run: rm -f EXCEL_FILE_ID.txt GDRIVE_SERVICE_ACCOUNT.json

      - name: 7. Commit & Push Changes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::💾 Saving Changes"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No changes to data."
          else
            git commit -m "Automated Batch Update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
          echo "::endgroup::"

      - name: 8. Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results
          path: |
            output.log
            reports/

      - name: 9. Display Report in Summary
        if: always()
        run: |
          report_file=$(ls -t reports/*_REPORT.txt 2>/dev/null | head -n1 || echo "")
          if [ -f "$report_file" ]; then
            echo "### 📊 Batch Execution Report" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat "$report_file" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 10. Trigger Next Batch
        if: success() && steps.run_updater.outputs.IS_FINAL_BATCH == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::notice::Triggering next workflow run..."
          gh workflow run "Excel → JSON Update" --ref ${{ github.ref_name }} -f max_fetches=${{ github.event.inputs.max_fetches || '50' }}

      - name: 11. Send Email Notification
        if: always() && (steps.run_updater.outputs.IS_FINAL_BATCH == 'true' || job.status != 'success')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Movie DB Batch Finished [${{ job.status }}]"
          body: "Workflow completed all batches. View the report in the GitHub Actions Summary."
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}