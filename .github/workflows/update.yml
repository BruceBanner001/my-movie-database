# ============================================================================
# Workflow: Excel → JSON Automation
# Purpose : Automate scheduled and manual Excel-to-JSON updates.
# Version : 4.9 (Patched + Reliability Improvements)
# ============================================================================

name: Excel → JSON Update

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 6"

jobs:
  update-json:
    timeout-minutes: 50
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      # -----------------------------------------------------------
      # 1️⃣ Checkout Repository
      # -----------------------------------------------------------
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # 2️⃣ Setup Python
      # -----------------------------------------------------------
      - name: 2. Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------
      # 3️⃣ Install Dependencies
      # -----------------------------------------------------------
      - name: 3. Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------
      # 4️⃣ Configure Secrets
      # -----------------------------------------------------------
      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json

      # -----------------------------------------------------------
      # 5️⃣ Run Python Script
      # -----------------------------------------------------------
      - name: 5. Run the Excel-to-JSON update script
        id: run_updater
        env:
          SHEETS: "Sheet1;Sheet2;Manual Updates"
          GITHUB_PAGES_URL: "https://brucebanner001.github.io/my-movie-database"
          DEBUG_FETCH: "true"
          MAX_FETCHES: "50"
        run: |

          python create_update_backup_delete.py 2>&1 | tee output.log
          script_exit_code=${PIPESTATUS[0]}

          output=$(cat output.log)

          # Safe delimiter for multi-line GitHub output
          EOF_DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)

          echo "output_log<<$EOF_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "$EOF_DELIMITER" >> "$GITHUB_OUTPUT"

          report_path=$(echo "$output" | grep -oP 'Report written -> \K.*' || true)
          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"

          # Detect whether another batch should run
          if [ -f "RESUME_FLAG.txt" ]; then
            echo "IS_FINAL_BATCH=false" >> "$GITHUB_OUTPUT"
          else
            echo "IS_FINAL_BATCH=true" >> "$GITHUB_OUTPUT"
          fi

          exit $script_exit_code

      # -----------------------------------------------------------
      # 6️⃣ Cleanup Secrets
      # -----------------------------------------------------------
      - name: 6. Cleanup Secret Files
        if: always()
        run: |
          rm -f EXCEL_FILE_ID.txt
          rm -f GDRIVE_SERVICE_ACCOUNT.json

      # -----------------------------------------------------------
      # 7️⃣ Commit + Push + Relay Batch
      # -----------------------------------------------------------
      - name: 7. Commit, Push, and Trigger Next Batch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          CONTINUE_RUN=false

          if [ -f "RESUME_FLAG.txt" ]; then
            CONTINUE_RUN=true
            rm RESUME_FLAG.txt
          fi

          # Remove logs so they are not committed
          rm -f output.log

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Automated data update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

          # -------- FIXED SYNTAX ERROR HERE --------
          if [ "$CONTINUE_RUN" = "true" ]; then
            echo "Batch finished. Triggering next batch..."
            gh workflow run "Excel → JSON Update" --ref "${{ github.ref_name }}"
          fi

      # -----------------------------------------------------------
      # 8️⃣ Compose Email
      # -----------------------------------------------------------
      - name: 8. Compose Email Body
        id: compose_email
        if: always()
        env:
          WORKFLOW_STATUS: ${{ job.status }}
          SCRIPT_OUTPUT: ${{ steps.run_updater.outputs.output_log }}
          REPORT_PATH: ${{ steps.run_updater.outputs.report_path }}
        run: |

          email_body_file=$(mktemp)
          echo "body_file=$email_body_file" >> "$GITHUB_OUTPUT"

          if [[ -n "$REPORT_PATH" && -f "$REPORT_PATH" ]]; then
            report_file="$REPORT_PATH"
          else
            report_file=$(find reports -type f -name "*_REPORT.txt" | sort -r | head -n1 || true)
          fi

          {

            if [[ "${WORKFLOW_STATUS}" == "success" ]]; then

              echo "✅ Workflow Batch completed successfully."
              echo ""

              if [[ -f "$report_file" ]]; then
                cat "$report_file"
              else
                echo "⚠️ Report file was not found."
              fi

            else

              echo "❌ Workflow FAILED."
              echo ""
              echo "Please check the GitHub Actions log."
              echo ""
              echo "Raw script output:"
              echo "======================================================"
              echo "$SCRIPT_OUTPUT"

            fi

          } > "$email_body_file"

      # -----------------------------------------------------------
      # 9️⃣ Send Email
      # -----------------------------------------------------------
      - name: 9. Send Final Email Notification
        if: always() && (steps.run_updater.outputs.IS_FINAL_BATCH == 'true' || job.status != 'success')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: >
            ${{ job.status == 'success'
              && '[Success] MyDramaList - Excel to JSON Final Batch Summary'
              || '[ACTION REQUIRED] Workflow FAILED' }}
          body: file://${{ steps.compose_email.outputs.body_file }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}