# ============================================================================
# Workflow: Excel → JSON Update (Relay-Race Edition)
# Version : 10.0 (Reporting Fix)
# ============================================================================

name: Excel → JSON Update

on:
  workflow_dispatch:
    inputs:
      max_fetches:
        description: "Max Rows per Batch"
        required: false
        default: "50"
  schedule:
    - cron: "30 18 * * 6"

# PREVENT CONFLICTS: Only one run sequence can edit the database at a time
concurrency:
  group: movie-db-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    env:
      SHEETS: "Sheet1;Sheet2;Manual Updates"
      DEBUG_FETCH: "true"

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 cloudscraper duckduckgo-search google-api-python-client google-auth-httplib2 google-auth-oauthlib pillow

      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json

      - name: 5. Run Python Engine
        id: run_script
        env:
          MAX_FETCHES: ${{ github.event.inputs.max_fetches || '50' }}
        run: |
          python create_update_backup_delete.py
          if [ -f "RESUME_FLAG.txt" ]; then
            echo "CONTINUE_BATCH=true" >> "$GITHUB_OUTPUT"
          else
            echo "CONTINUE_BATCH=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 6. Cleanup Secrets
        if: always()
        run: rm -f EXCEL_FILE_ID.txt GDRIVE_SERVICE_ACCOUNT.json

      - name: 7. Commit & Push Changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # We add everything including BATCH_REPORT_DATA.json (if it exists)
          # or we stage its deletion if the script removed it.
          git add -A
          if git diff --cached --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "Automated Batch Update: Run ${{ github.run_number }}"
            git push
          fi

      - name: 8. Prepare Report for Summary & Email
        if: always()
        id: get_report
        run: |
          # Robust Find: Pick the newest file in reports folder that contains "REPORT"
          REPORT_PATH=$(ls -t reports/REPORT_*.txt 2>/dev/null | head -n1 || echo "")
          echo "REPORT_PATH=$REPORT_PATH" >> $GITHUB_ENV
          
          # READ the custom email subject generated by Python
          if [ -f "EMAIL_SUBJECT.txt" ]; then
            echo "EMAIL_SUBJECT=$(cat EMAIL_SUBJECT.txt)" >> $GITHUB_ENV
          else
            echo "EMAIL_SUBJECT=Movie DB Sync Finished [${{ job.status }}]" >> $GITHUB_ENV
          fi
          
          if [ -f "$REPORT_PATH" ]; then
            echo "### 📊 Workflow Execution Report" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_PATH" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 9. Trigger Next Batch
        if: success() && steps.run_script.outputs.CONTINUE_BATCH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Notice: Batch limit hit. Restarting for next batch..."
          gh workflow run "Excel → JSON Update" --ref ${{ github.ref_name }} -f max_fetches=${{ github.event.inputs.max_fetches || '50' }}

      - name: 10. Send Email Notification
        # Send email ONLY on Final Success (Relay Finished) or any Failure
        if: always() && (steps.run_script.outputs.CONTINUE_BATCH == 'false' || job.status != 'success')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          body: file://${{ env.REPORT_PATH }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}