# ============================================================================
# Workflow: Excel → JSON Update (Relay-Race Edition)
# Version : 9.0 (Professional Cumulative Reporting & Email Subject)
# ============================================================================

name: Excel → JSON Update

on:
  workflow_dispatch:
    inputs:
      max_fetches:
        description: "Max Rows per Batch"
        required: false
        default: "50"
  schedule:
    - cron: "30 18 * * 6"

# PREVENT CONFLICTS: Only one run sequence can edit the database at a time
concurrency:
  group: movie-db-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    env:
      SHEETS: "Sheet1;Sheet2;Manual Updates"
      GITHUB_PAGES_URL: "https://brucebanner001.github.io/my-movie-database"
      DEBUG_FETCH: "true"

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install Dependencies
        run: |
          echo "::group::📦 Dependencies"
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          echo "::endgroup::"

      - name: 4. Configure Secrets
        env:
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          echo "::group::🔑 Credentials"
          printf '%s' "$EXCEL_FILE_ID" > EXCEL_FILE_ID.txt
          printf '%s' "$GDRIVE_SERVICE_ACCOUNT" > GDRIVE_SERVICE_ACCOUNT.json
          echo "::endgroup::"

      - name: 5. Run Python Engine
        id: run_script
        env:
          MAX_FETCHES: ${{ github.event.inputs.max_fetches || '50' }}
        run: |
          echo "::group::🚀 Processing Data"
          python create_update_backup_delete.py 2>&1 | tee output.log
          exit_code=${PIPESTATUS[0]}
          
          if [ -f "RESUME_FLAG.txt" ]; then
            echo "CONTINUE_BATCH=true" >> "$GITHUB_OUTPUT"
          else
            echo "CONTINUE_BATCH=false" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"
          exit $exit_code

      - name: 6. Cleanup Secrets
        if: always()
        run: rm -f EXCEL_FILE_ID.txt GDRIVE_SERVICE_ACCOUNT.json

      - name: 7. Commit & Push Changes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::💾 Saving Changes"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # RESUME_FLAG is deleted by shell, but BATCH_REPORT_DATA is kept by Git
          rm -f RESUME_FLAG.txt
          
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated Batch Update: $(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')"
            git push
          fi
          echo "::endgroup::"

      - name: 8. Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results
          path: |
            output.log
            reports/

      - name: 9. Prepare Report for Email & Summary
        if: always()
        id: get_report
        run: |
          # Find the latest report text file
          REPORT_PATH=$(ls -t reports/*_REPORT.txt 2>/dev/null | head -n1 || echo "")
          echo "REPORT_PATH=$REPORT_PATH" >> $GITHUB_ENV
          
          # READ the custom email subject generated by Python v10.6
          if [ -f "EMAIL_SUBJECT.txt" ]; then
            SUBJECT=$(cat EMAIL_SUBJECT.txt)
            echo "EMAIL_SUBJECT=$SUBJECT" >> $GITHUB_ENV
          else
            echo "EMAIL_SUBJECT=Movie DB Batch Finished [${{ job.status }}]" >> $GITHUB_ENV
          fi
          
          if [ -f "$REPORT_PATH" ]; then
            echo "### 📊 Workflow Execution Report" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_PATH" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 10. Trigger Next Batch
        if: success() && steps.run_script.outputs.CONTINUE_BATCH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::notice::Limit hit. Restarting for next batch..."
          gh workflow run "Excel → JSON Update" --ref ${{ github.ref_name }} -f max_fetches=${{ github.event.inputs.max_fetches || '50' }}

      - name: 11. Send Email Notification
        # Send email ONLY on Final Success (Relay Finished) or any Failure
        if: always() && (steps.run_script.outputs.CONTINUE_BATCH == 'false' || job.status != 'success')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          body: file://${{ env.REPORT_PATH }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}