name: Excel тЖТ JSON Workflow

on:
  workflow_dispatch:
    inputs:
      max_fetches:
        description: "Max Process Per Run"
        required: false
        default: "50"

jobs:
  excel-to-json:
    runs-on: ubuntu-latest

    env:
      SHEETS: "Sheet1;Sheet2;Manual Updates"
      GITHUB_PAGES_URL: "https://brucebanner001.github.io/my-movie-database"
      DEBUG_FETCH: true

    steps:

      # ------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------
      # Setup Python
      # ------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------
      # Install Dependencies
      # ------------------------------------------------
      - name: Install Dependencies
        run: |
          echo "::group::ЁЯУж Installing Dependencies"

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "::notice::requirements.txt not found тАФ skipping installation"
          fi

          echo "::endgroup::"

      # ------------------------------------------------
      # Run Python Script
      # ------------------------------------------------
      - name: Run Excel тЖТ JSON Script
        id: run_script
        run: |

          ##################################################
          # WORKFLOW START
          ##################################################

          echo "::group::ЁЯЪА Starting Workflow"

          START_TIME_FORMATTED=$(TZ='Asia/Kolkata' date +"%d %B %Y - %I:%M:%S %p")
          START_TIME_SECONDS=$(date +%s)

          echo "start_time=$START_TIME_FORMATTED" >> "$GITHUB_OUTPUT"

          MAX_FETCHES_VALUE="${{ github.event.inputs.max_fetches }}"

          if [ -z "$MAX_FETCHES_VALUE" ]; then
            MAX_FETCHES_VALUE="50"
            echo "::notice::Using default Max Process = 50"
          fi

          echo "MAX_FETCHES=$MAX_FETCHES_VALUE" >> $GITHUB_ENV
          echo "max_fetches=$MAX_FETCHES_VALUE" >> "$GITHUB_OUTPUT"

          echo "::notice::Max Process Per Run: $MAX_FETCHES_VALUE"
          echo "::notice::Start Time: $START_TIME_FORMATTED"

          echo "::endgroup::"


          ##################################################
          # RUN SCRIPT
          ##################################################

          echo "::group::ЁЯРН Running Python Script"

          python create_update_backup_delete.py 2>&1 | tee output.log
          SCRIPT_EXIT_CODE=${PIPESTATUS[0]}

          if [ $SCRIPT_EXIT_CODE -ne 0 ]; then
            echo "::error::Python script failed with exit code $SCRIPT_EXIT_CODE"
          else
            echo "::notice::Python script finished successfully"
          fi

          echo "::endgroup::"


          ##################################################
          # CALCULATE RUNTIME
          ##################################################

          echo "::group::тП▒я╕П Calculating Runtime"

          END_TIME_SECONDS=$(date +%s)
          RUNTIME=$((END_TIME_SECONDS-START_TIME_SECONDS))

          format_runtime() {

            total_seconds=$1
            hours=$((total_seconds / 3600))
            minutes=$(((total_seconds % 3600) / 60))
            seconds=$((total_seconds % 60))

            if [ $hours -gt 0 ]; then
              echo "${hours} hour $([ $hours -gt 1 ] && echo s) ${minutes} minute $([ $minutes -ne 1 ] && echo s)"
            elif [ $minutes -gt 0 ]; then
              echo "${minutes} minute $([ $minutes -ne 1 ] && echo s)"
            else
              echo "${seconds} seconds"
            fi
          }

          RUNTIME_FORMATTED=$(format_runtime $RUNTIME)

          echo "runtime_seconds=$RUNTIME" >> "$GITHUB_OUTPUT"
          echo "runtime_formatted=$RUNTIME_FORMATTED" >> "$GITHUB_OUTPUT"

          echo "::notice::Runtime: $RUNTIME_FORMATTED"

          echo "::endgroup::"


          ##################################################
          # EXTRACT REPORT PATH
          ##################################################

          echo "::group::ЁЯУД Extracting Report Path"

          OUTPUT_LOG=$(cat output.log)

          report_path=$(echo "$OUTPUT_LOG" | grep -oP 'Report written -> \K.*')

          if [ -z "$report_path" ]; then
            echo "::warning::Report path not detected"
          else
            echo "::notice::Report found: $report_path"
          fi

          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"

          echo "::endgroup::"


          ##################################################
          # CHECK FOR NEXT BATCH
          ##################################################

          echo "::group::ЁЯФБ Batch Detection"

          if [ -f "RESUME_FLAG.txt" ]; then
            echo "IS_FINAL_BATCH=false" >> "$GITHUB_OUTPUT"
            echo "::notice::More batches remaining"
          else
            echo "IS_FINAL_BATCH=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Final batch completed"
          fi

          echo "::endgroup::"

          exit $SCRIPT_EXIT_CODE


      # ------------------------------------------------
      # Upload Debug Logs
      # ------------------------------------------------
      - name: Upload Debug Log
        uses: actions/upload-artifact@v4
        with:
          name: workflow-debug-log
          path: output.log


      # ------------------------------------------------
      # Upload Report File
      # ------------------------------------------------
      - name: Upload Report
        if: steps.run_script.outputs.report_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: workflow-report
          path: ${{ steps.run_script.outputs.report_path }}


      # ------------------------------------------------
      # Show Report in Logs
      # ------------------------------------------------
      - name: Display Report
        if: steps.run_script.outputs.report_path != ''
        run: |
          echo "::group::ЁЯУК Workflow Report"
          cat "${{ steps.run_script.outputs.report_path }}"
          echo "::endgroup::"


      # ------------------------------------------------
      # Workflow Summary
      # ------------------------------------------------
      - name: Workflow Summary
        run: |
          echo "## ЁЯУК Workflow Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ЁЯЪА Start Time: ${{ steps.run_script.outputs.start_time }}" >> $GITHUB_STEP_SUMMARY
          echo "тП▒ Runtime: ${{ steps.run_script.outputs.runtime_formatted }}" >> $GITHUB_STEP_SUMMARY
          echo "тЪЩя╕П Max Process: ${{ steps.run_script.outputs.max_fetches }}" >> $GITHUB_STEP_SUMMARY


      # ------------------------------------------------
      # AUTO CONTINUE NEXT BATCH
      # ------------------------------------------------
      - name: Trigger Next Batch
        if: steps.run_script.outputs.IS_FINAL_BATCH == 'false'
        run: |

          echo "::notice::Triggering next batch run..."

          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/excel_to_json.yml/dispatches \
          -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"max_fetches\":\"${{ steps.run_script.outputs.max_fetches }}\"}}"